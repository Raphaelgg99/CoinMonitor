# ==========================================
# BANCO H2 EM MEM”RIA (substitui PostgreSQL)
# ==========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# ==========================================
# VARI¡VEIS DE AMBIENTE (mapeamento exato)
# ==========================================
SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
SPRING_DATASOURCE_USERNAME=sa
SPRING_DATASOURCE_PASSWORD=
JWT_SECRET=fake-secret-for-testing-only-1234567890
CORS_ORIGINS=http://localhost:4200
COINGECKO_API_KEY=fake-coingecko-key
OPENAI_API_KEY=fake-openai-key
BREVO_API_KEY=fake-brevo-key

# ==========================================
# PROPRIEDADES SPRING MAPEADAS
# ==========================================
api.security.token.secrets=fake-secret-for-testing-only-1234567890
api.security.cors.origins=http://localhost:4200
security.config.prefix=Bearer
security.config.key=SECRET_KEY
security.config.expiration=86400000
google.client.id=fake-client-id.apps.googleusercontent.com
coingecko.api.key=fake-coingecko-key
openai.api.key=fake-openai-key

# ==========================================
# DESABILITAR COISAS DESNECESS¡RIAS NO TESTE
# ==========================================
management.health.mail.enabled=false
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always